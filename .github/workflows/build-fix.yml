name: Build Fix

on:
  push:
    branches: [main]

jobs:
  fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run build fix script
        run: node scripts/build-fix.js

      - name: Commit fixes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "auto-fix paths" || exit 0
          git push
