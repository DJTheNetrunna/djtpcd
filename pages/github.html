<script>
  const username = "djthepcdude"; // or "DJTheNetrunna" if that's the real repo owner
  const url = `https://api.github.com/users/${username}/repos?sort=updated&per_page=100`;

  fetch(url, {
    headers: {
      "Accept": "application/vnd.github+json"
    }
  })
    .then(async (response) => {
      if (!response.ok) {
        const text = await response.text();
        throw new Error(`GitHub API error ${response.status}: ${text}`);
      }
      return response.json();
    })
    .then((repos) => {
      const container = document.getElementById("repo-list");
      container.innerHTML = "";

      if (!Array.isArray(repos) || repos.length === 0) {
        container.innerHTML = '<p class="text-yellow-400">No public repositories found.</p>';
        return;
      }

      repos.forEach((repo) => {
        const card = document.createElement("article");
        card.className = "bg-gray-800 p-4 rounded-2xl shadow-lg neon-glow";

        const safeName = repo.name || "Untitled";
        const safeDesc = repo.description || "No description yet.";
        const safeLang = repo.language || "N/A";
        const stars = Number(repo.stargazers_count || 0);
        const repoUrl = repo.html_url || "#";

        card.innerHTML = `
          <h3 class="text-xl font-semibold mb-2 text-cyan-400">${safeName}</h3>
          <p class="text-gray-300 mb-2 text-sm">${safeDesc}</p>
          <p class="text-xs text-gray-400">${safeLang} | ⭐ ${stars}</p>
          <a href="${repoUrl}" target="_blank" rel="noopener noreferrer" class="block mt-3 text-cyan-300 underline">
            View on GitHub
          </a>
        `;

        container.appendChild(card);
      });
    })
    .catch((err) => {
      console.error(err);
      document.getElementById("repo-list").innerHTML =
        `<p class="text-red-400">Failed to load repositories: ${err.message}</p>`;
    });
</script>
